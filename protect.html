<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protect PDF | EasyUseHub</title>
<style>
body{margin:0;padding:0;font-family:'Segoe UI',sans-serif;background:#fff;color:#1e293b;display:flex;flex-direction:column;align-items:center;min-height:100vh;position:relative;}
.container{display:flex;flex-direction:column;align-items:center;gap:25px;max-width:600px;width:90%;padding:40px 20px;text-align:center;}
h1{font-size:3rem;margin-bottom:10px;}
.subtitle{font-size:1.2rem;color:#475569;}
.upload{width:100%;padding:40px;border:3px dashed #22c55e;border-radius:15px;background:#f1f5f9;cursor:pointer;font-size:1.3rem;font-weight:bold;color:#16a34a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:.3s;box-shadow:0 6px 15px rgba(0,0,0,0.05);}
.upload:hover{background:#e6f4ea;transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,0.15);}
.upload-icon{font-size:3rem;}
input[type="password"]{width:100%;padding:18px;font-size:1.2rem;border-radius:10px;border:1px solid #ccc;background:#f1f5f9;color:#1e293b;}
button{width:100%;padding:18px;font-size:1.3rem;border:none;border-radius:10px;background:#22c55e;color:white;font-weight:bold;cursor:pointer;transition:.3s;}
button:hover{background:#16a34a;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.2);}
#status{font-size:1.2rem;color:#475569;}
.bottom-buttons{position:fixed;bottom:20px;display:flex;flex-direction:column;gap:10px;width:90%;max-width:400px;align-items:center;}
.bottom-buttons a{width:100%;text-align:center;padding:15px;font-size:1.1rem;font-weight:bold;border-radius:10px;text-decoration:none;color:#fff;transition:.3s;}
.all-tools{background:#1e293b;}
.all-tools:hover{background:#3b82f6;}
.home-btn{background:#22c55e;}
.home-btn:hover{background:#16a34a;}
</style>
</head>
<body>

<div class="container">
<h1>🔐 Protect PDF</h1>
<p class="subtitle">Upload your PDF and add a password to secure it instantly.</p>

<div class="upload" onclick="document.getElementById('file').click()">
<div class="upload-icon">📁</div>
Click to upload PDF file
</div>
<input type="file" id="file" accept="application/pdf" hidden>

<input type="password" id="password" placeholder="Enter password">
<button onclick="protectPDF()">Protect PDF</button>

<p id="status">No file selected</p>
</div>

<div class="bottom-buttons">
<a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1" class="all-tools">📂 All PDF Tools</a>
<a href="https://easyusehub.blogspot.com/?m=1" class="home-btn">🏠 Home</a>
</div>

<script>
let file = null;
document.getElementById('file').addEventListener('change', e=>{
file = e.target.files[0];
document.getElementById('status').innerText = file ? file.name : 'No file selected';
});

function protectPDF(){
    if(!file){ alert('Upload PDF first'); return; }
    let password = document.getElementById('password').value;
    if(!password){ alert('Enter password'); return; }

    document.getElementById('status').innerText = "Protecting PDF...";

    const formData = new FormData();
    formData.append('pdf', file);
    formData.append('password', password);

    fetch('/api/protect', {method:'POST', body:formData})
    .then(res => {
        if(!res.ok) throw new Error('Error!');
        return res.blob();
    })
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'protected.pdf';
        a.click();
        document.getElementById('status').innerText = "Download ready!";
    })
    .catch(()=>{
        document.getElementById('status').innerText = "Error protecting PDF!";
    });
}
</script>

</body>
</html>
