<!                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure PDF | EasyUseHub</title>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 1rem; color: #1e293b; }
        .upload-area { border: 2px dashed #cbd5e1; padding: 2rem; border-radius: 12px; cursor: pointer; margin-bottom: 1.5rem; transition: 0.3s; }
        .upload-area:hover { border-color: var(--primary); background: #f1f5f9; }
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--success); color: white; font-weight: 600; cursor: pointer; font-size: 1rem; }
        button:hover { opacity: 0.9; }
        #status { margin-top: 1rem; font-size: 0.9rem; color: #64748b; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔐 Protect PDF</h2>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 20px;">Upload a file and set a password</p>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <span id="fileText">📁 Click to upload PDF</span>
    </div>

    <input type="file" id="fileInput" accept="application/pdf" class="hidden">
    <input type="password" id="password" placeholder="Enter strong password">
    
    <button onclick="uploadAndProtect()" id="submitBtn">Protect & Download</button>
    
    <p id="status"></p>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileText = document.getElementById('fileText');
    const status = document.getElementById('status');

    // Show selected filename
    fileInput.onchange = () => {
        if(fileInput.files[0]) fileText.innerText = "📄 " + fileInput.files[0].name;
    };

    async function uploadAndProtect() {
        const file = fileInput.files[0];
        const password = document.getElementById('password').value;

        if (!file || !password) {
            alert("Please select a file and enter a password.");
            return;
        }

        status.innerText = "⏳ Processing on server...";
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;

        // Prepare data for API
        const formData = new FormData();
        formData.append('pdf', file);
        formData.append('password', password);

        try {
            const response = await fetch('/api/protect', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Server error occurred');

            // Receive the protected PDF as a Blob
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            // Create a hidden link to trigger download
            const a = document.createElement('a');
            a.href = url;
            a.download = `protected_${file.name}`;
            document.body.appendChild(a);
            a.click();
            a.remove();

            status.innerHTML = "<span style='color:green'>✅ Success! Downloaded.</span>";
        } catch (err) {
            console.error(err);
            status.innerHTML = "<span style='color:red'>❌ Error connecting to server.</span>";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
