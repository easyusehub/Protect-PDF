<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protect PDF | EasyUseHub</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<div class="protect-container">
    <h1>🔐 Protect Your PDF</h1>
    <p class="subtitle">
        Upload your PDF and add a password to secure it instantly.
    </p>

    <!-- File Upload -->
    <input type="file" id="file" accept="application/pdf">

    <!-- Password Input -->
    <input type="password" id="password" placeholder="Enter password">

    <!-- Protect Button -->
    <button onclick="protectPDF()">Protect PDF</button>

    <!-- Status -->
    <p id="status">No file selected</p>
</div>

<script>
let file = null;
document.getElementById('file').addEventListener('change', function(e){
    file = e.target.files[0];
    document.getElementById('status').innerText = file ? file.name : 'No file selected';
});

function protectPDF(){
    if(!file){ alert('Upload PDF first'); return; }
    let pass = document.getElementById('password').value;
    if(!pass){ alert('Enter password'); return; }

    document.getElementById('status').innerText = "Protecting PDF...";

    // Demo: remove setTimeout if using API
    setTimeout(()=>{
        document.getElementById('status').innerText = "PDF protected successfully (Demo)";
    },1500);
}
</script>

</body>
</html>
