<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protect PDF | EasyUseHub</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #fff fixed;
    color: #1e293b;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}
.container {
    width: 400px;
    max-width: 90%;
    margin: auto;
    padding: 40px 20px;
    text-align: center;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    margin-top: 60px;
    margin-bottom: 200px;
}
h1 { font-size: 2.5rem; margin-bottom: 10px; }
.subtitle { font-size: 1rem; color: #475569; margin-bottom: 25px; }
.upload {
    width: 100%;
    padding: 35px;
    border: 3px dashed #22c55e;
    border-radius: 15px;
    background: #f1f5f9;
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: bold;
    color: #16a34a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: 0.3s;
    box-shadow: 0 6px 15px rgba(0,0,0,0.05);
}
.upload:hover { background: #e6f4ea; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
.upload-icon { font-size: 2.5rem; }
input[type="password"] {
    width: 100%;
    padding: 15px;
    font-size: 1.1rem;
    border-radius: 10px;
    border: 1px solid #ccc;
    background: #f1f5f9;
    color: #1e293b;
    margin-top: 15px;
}
button {
    width: 100%;
    padding: 15px;
    font-size: 1.2rem;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}
button:hover { background: #16a34a; }
#status { font-size: 1rem; color: #475569; margin-top: 15px; }
#download-btn {
    display: none;
    width: 100%;
    padding: 15px;
    font-size: 1.2rem;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}
#download-btn:hover { background: #1e40af; }
.bottom-buttons {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 90%;
    max-width: 400px;
    z-index: 1000;
}
.bottom-buttons a {
    width: 100%;
    text-align: center;
    padding: 15px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 10px;
    text-decoration: none;
    color: #fff;
    transition: 0.3s;
}
.all-tools { background: #1e293b; }
.all-tools:hover { background: #3b82f6; }
.home-btn { background: #22c55e; }
.home-btn:hover { background: #16a34a; }
</style>
</head>
<body>

<div class="container">
    <h1>🔐 Protect PDF</h1>
    <p class="subtitle">Upload your PDF and add a password to secure it instantly.</p>

    <div class="upload" onclick="document.getElementById('file').click()">
        <div class="upload-icon">📁</div>
        Click to upload PDF file
    </div>
    <input type="file" id="file" accept="application/pdf" hidden>

    <input type="password" id="password" placeholder="Enter password">
    <button onclick="protectPDF()">Protect PDF</button>

    <button id="download-btn">Download Protected PDF</button>
    <p id="status">No file selected</p>
</div>

<div class="bottom-buttons">
    <a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1" class="all-tools">📂 All PDF Tools</a>
    <a href="https://easyusehub.blogspot.com/?m=1" class="home-btn">🏠 Home</a>
</div>

<script>
let file = null;
let downloadUrl = '';

document.getElementById('file').addEventListener('change', e=>{
    file = e.target.files[0];
    document.getElementById('status').innerText = file ? file.name : 'No file selected';
});

function protectPDF(){
    if(!file){ alert('Upload PDF first'); return; }
    let password = document.getElementById('password').value;
    if(!password){ alert('Enter password'); return; }

    document.getElementById('status').innerText = "Protecting PDF...";

    const formData = new FormData();
    formData.append('pdf', file);
    formData.append('password', password);

    fetch('/api/protect', {method:'POST', body:formData})
    .then(res => { if(!res.ok) throw new Error('Error'); return res.blob(); })
    .then(blob => {
        downloadUrl = window.URL.createObjectURL(blob);
        const downloadBtn = document.getElementById('download-btn');
        downloadBtn.style.display = 'block';
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = 'protected.pdf';
            a.click();
        };
        document.getElementById('status').innerText = "PDF ready! Click Download below.";
    })
    .catch(()=>{ document.getElementById('status').innerText = "Error protecting PDF!"; });
}
</script>

</body>
</html>
