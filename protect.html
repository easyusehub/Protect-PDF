<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protect PDF | EasyUseHub</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        :root { --primary: #22c55e; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 90%; max-width: 400px; text-align: center; }
        .upload-zone { border: 2px dashed #cbd5e1; padding: 2rem; border-radius: 15px; cursor: pointer; margin-bottom: 1rem; color: #64748b; }
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-green { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .nav-link { text-decoration: none; color: white; background: #64748b; padding: 10px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .nav-link.dark { background: var(--dark); }
        #status { margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔐 Protect PDF</h1>
    <p style="color:#64748b; margin-bottom:20px;">Securely encrypt your PDF with a password</p>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">📁 Click to upload PDF<br><small>Max size: 50MB</small></span>
    </div>
    
    <input type="file" id="fileInput" accept="application/pdf" style="display:none">
    <input type="password" id="passInput" placeholder="Enter password">
    
    <button class="btn-green" onclick="protectPDF()">Protect & Download</button>
    
    <div id="status"></div>

    <div class="nav-btns">
        <a href="https://easyusehub.blogspot.com/?m=1" class="nav-link">🏠 Home</a>
        <a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1" class="nav-link dark">📂 All PDF Tools</a>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const status = document.getElementById('status');

    fileInput.onchange = () => {
        if(fileInput.files[0]) fileName.innerHTML = "📄 <b>" + fileInput.files[0].name + "</b>";
    };

    async function protectPDF() {
        const file = fileInput.files[0];
        const password = document.getElementById('passInput').value;

        if (!file || !password) {
            alert("Please select a file and enter a password!");
            return;
        }

        status.innerHTML = "⏳ Processing locally...";

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);

            // Apply encryption locally in the browser
            pdfDoc.encrypt({
                userPassword: password,
                ownerPassword: 'secure_owner_key',
                permissions: { printing: 'highResolution', modifying: false, copying: false }
            });

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            
            // Download
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `protected_${file.name}`;
            link.click();

            status.innerHTML = "<span style='color:green'>✅ Success! Downloaded.</span>";
        } catch (e) {
            console.error(e);
            status.innerHTML = "<span style='color:red'>❌ Error: Encryption failed.</span>";
        }
    }
</script>

</body>
</html>
