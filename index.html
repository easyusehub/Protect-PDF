<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protect PDF – EasyUseHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;text-align:center;margin:0;padding:0;background:#f5f7fa;}
header{padding:15px;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.1);}
button{padding:15px 25px;margin:50px 0;border:none;border-radius:6px;cursor:pointer;background:#2563eb;color:#fff;font-size:16px;}
#ad-top, #ad-middle{margin:20px 0;padding:20px;background:#eee;}
#iframeOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:9999;}
#toolFrame{width:100%;height:100%;border:none;}
#iframeOverlay button{position:absolute;top:10px;right:10px;z-index:1000;padding:10px 15px;}
</style>
</head>
<body>

<header>
<h2>Protect PDF – EasyUseHub</h2>
</header>

<div id="ad-top">Top Ad Placeholder</div>

<main>
<p>Click the button below to go to ILovePDF Protect PDF inside your site.</p>
<button onclick="openIframe('https://www.ilovepdf.com/protect-pdf')">Go</button>
</main>

<div id="ad-middle">Middle Ad Placeholder</div>

<!-- Iframe Overlay -->
<div id="iframeOverlay">
  <button onclick="closeIframe()">Back</button>
  <iframe id="toolFrame"></iframe>
</div>

<script>
function openIframe(url){
    document.getElementById('toolFrame').src = url;
    document.getElementById('iframeOverlay').style.display = 'block';
}

function closeIframe(){
    document.getElementById('iframeOverlay').style.display = 'none';
    document.getElementById('toolFrame').src = '';
}
</script>

</body>
</html>
