<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protect PDF – EasyUseHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{ margin:0; font-family:Arial; background:#f5f7fa; text-align:center; position: relative; min-height: 100vh;}
header{ background:#fff; padding:15px; box-shadow:0 2px 5px rgba(0,0,0,.1); }
.container{ width:90%; max-width:900px; margin:30px auto; }

/* ইন-পেজ পুশ অ্যাড স্টাইল */
#push-ad {
    position: fixed;
    bottom: -150px; /* শুরুতে স্ক্রিনের নিচে লুকানো থাকবে */
    right: 20px;
    width: 300px;
    background: #fff;
    border-left: 5px solid #2563eb;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 15px;
    text-align: left;
    z-index: 9999;
    transition: bottom 0.5s ease-in-out;
    display: flex;
    align-items: center;
    cursor: pointer;
}
#push-ad.show { bottom: 20px; } /* দেখানোর সময় উপরে উঠে আসবে */
#push-ad img { width: 50px; height: 50px; border-radius: 5px; margin-right: 12px; }
.ad-content { flex: 1; }
.ad-content b { font-size: 14px; color: #333; display: block; margin-bottom: 3px; }
.ad-content p { font-size: 12px; color: #666; margin: 0; }
.close-ad { position: absolute; top: 5px; right: 8px; font-size: 18px; color: #999; cursor: pointer; }

.upload-btn{ display:inline-block; padding:15px 30px; background:#2563eb; color:#fff; border-radius:6px; cursor:pointer; margin:20px 0; }
.buttons{ margin-top:30px; }
.buttons button{ padding:10px 20px; margin:5px; border:none; border-radius:5px; cursor:pointer; color:#fff; }
.tools{ background:#10b981; }
.home{ background:#f59e0b; }
</style>
</head>
<body>

<header>
<h2>Protect PDF – EasyUseHub</h2>
</header>

<div id="push-ad" onclick="window.open('https://easyusehub.blogspot.com', '_blank')">
    <span class="close-ad" onclick="event.stopPropagation(); document.getElementById('push-ad').classList.remove('show');">&times;</span>
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968313.png" alt="icon">
    <div class="ad-content">
        <b>🚀 46+ Premium Tools Ready!</b>
        <p>Unlock Calculators, Converters & AI tools at EasyUseHub.</p>
    </div>
</div>

<div class="container">
    <p>Secure your PDF with high-level encryption.</p>
    <label class="upload-btn" onclick="loadProtectWidget()">Upload File</label>
    <div id="widgetArea" style="margin-top:30px;"></div>

    <div class="buttons">
        <button class="tools" onclick="window.location.href='https://easyusehub.blogspot.com/p/free-pdf-tools-online.html'">All PDF Tools</button>
        <button class="home" onclick="window.location.href='https://easyusehub.blogspot.com/?m=1'">Home</button>
    </div>
</div>

<script src="https://tools.pdf24.org/static/js/widget.js"></script>
<script>
function loadProtectWidget(){
    pdf24.loadWidget('lock-pdf', {
        containerId: 'widgetArea',
        langCode: 'en',
        widgetConfig: { theme: 'lightTheme' }
    });

    // ইন-পেজ পুশ অ্যাড ট্রিগার
    // ইউজার যখনই উইজেট এরিয়ায় ক্লিক করবে (কাজ শুরু করবে), ৩ সেকেন্ড পর অ্যাডটা আসবে
    document.getElementById('widgetArea').addEventListener('click', function() {
        setTimeout(function() {
            document.getElementById('push-ad').classList.add('show');
        }, 3000); // ৩ সেকেন্ড পর স্লাইড করে আসবে
    }, {once: true});
}
</script>

</body>
</html>
