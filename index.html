<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protect PDF | EasyUseHub</title>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.standard.min.js"></script>
    <style>
        :root { --primary: #22c55e; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        .upload-area { border: 2px dashed #cbd5e1; padding: 35px 15px; border-radius: 15px; cursor: pointer; margin-bottom: 15px; background: #fff; }
        input[type="password"] { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #status { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
        .nav-btns { display: flex; gap: 10px; margin-top: 25px; justify-content: center; }
        .nav-link { text-decoration: none; color: white; background: #64748b; padding: 12px 18px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">🔐 Protect PDF</h2>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <span id="nameLabel">📁 Select PDF File</span>
    </div>
    <input type="file" id="fileInput" accept="application/pdf" style="display:none">
    <input type="password" id="passInput" placeholder="Enter Password">
    
    <button class="btn" id="lockBtn" onclick="processPDF()">Protect & Download</button>
    
    <div id="status"></div>

    <div class="nav-btns">
        <a href="https://easyusehub.blogspot.com/?m=1" class="nav-link">🏠 Home</a>
        <a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1" class="nav-link" style="background:var(--dark)">📂 All Tools</a>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const lockBtn = document.getElementById('lockBtn');

    fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('nameLabel').innerText = fileInput.files[0].name; };

    function log(msg, type = 'info') {
        status.style.display = "block";
        status.style.background = type === 'error' ? "#fee2e2" : "#dcfce7";
        status.style.color = type === 'error' ? "#991b1b" : "#15803d";
        status.innerText = msg;
    }

    async function processPDF() {
        const file = fileInput.files[0];
        const pass = document.getElementById('passInput').value;

        if (!file || !pass) return alert("Please select a file and enter a password.");

        log("⏳ Encrypting... please wait.");
        lockBtn.disabled = true;

        try {
            // 1. Get Library references
            const { PDFDocument } = PDFLib;
            
            // 2. Load the PDF as an ArrayBuffer
            const arrayBuffer = await file.arrayBuffer();
            const pdfDoc = await PDFDocument.load(arrayBuffer, { ignoreEncryption: true });

            // 3. Double Check encryption support
            if (typeof pdfDoc.encrypt !== 'function') {
                throw new Error("This browser loaded the wrong library version. Try clearing your browser cache.");
            }

            // 4. Apply Encryption
            await pdfDoc.encrypt({
                userPassword: pass,
                ownerPassword: 'owner_' + Math.random().toString(36).substring(7),
                permissions: {
                    printing: 'highResolution',
                    modifying: false,
                    copying: false
                }
            });

            // 5. Save and Download
            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "protected_" + file.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            log("✅ Success! PDF is protected.");
        } catch (e) {
            console.error(e);
            log("❌ ERROR: " + e.message, "error");
        } finally {
            lockBtn.disabled = false;
        }
    }
</script>

</body>
</html>
