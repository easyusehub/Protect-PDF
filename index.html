<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protect PDF – EasyUseHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f5f7fa;margin:0;padding:0;text-align:center;}
header{background:#fff;padding:15px;box-shadow:0 2px 5px rgba(0,0,0,.1);}
header img{height:60px;}
main{max-width:700px;margin:40px auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,.08);}
input[type=file], input[type=password]{margin:10px 0; padding:10px; width:80%; font-size:16px;}
button{padding:12px 20px;border:none;border-radius:6px;font-size:16px;cursor:pointer;}
button.protect{background:#2563eb;color:#fff;}
button.protect:hover{background:#1e40af;}
button.premium{background:#f59e0b;color:#fff;margin:5px;}
button.home{background:#10b981;color:#fff;margin:5px;}
#progress-container{width:100%;max-width:400px;margin:20px auto;display:none;background:#e5e7eb;border-radius:5px;}
#progress-bar{width:0%;height:20px;background:#2563eb;border-radius:5px;}
#ad-placeholder{margin:20px 0;padding:20px;background:#f0f0f0;text-align:center;color:#777;}
#msg{margin-top:20px;font-weight:bold;}
.instructions{margin:20px 0;font-size:16px;color:#333;}
</style>
</head>
<body>

<header>
  <img src="https://i.ibb.co.com/dJzLMz0v/file-0000000031a471f89cb536e7c16bcf16.png" alt="EasyUseHub Logo">
</header>

<main>
  <div id="ad-placeholder">Top Ad Placeholder</div>

  <div class="instructions">
    1. Upload your PDF file.<br>
    2. Enter a password to protect it.<br>
    3. Click "Protect PDF" to download the password-protected version.
  </div>

  <input type="file" id="pdfFile" accept="application/pdf"><br>
  <input type="password" id="pdfPassword" placeholder="Enter a password"><br>
  <button class="protect" onclick="protectPDF()">Protect PDF</button>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="msg"></div>

  <div style="margin-top:30px;">
    <button class="premium" onclick="window.open('https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1','_blank')">All PDF Tools</button>
    <button class="home" onclick="window.open('https://easyusehub.blogspot.com/?m=1','_blank')">Home</button>
  </div>
</main>

<script>
async function protectPDF(){
  const fileInput = document.getElementById("pdfFile");
  const passwordInput = document.getElementById("pdfPassword");
  const msg = document.getElementById("msg");
  const progressContainer = document.getElementById("progress-container");
  const progressBar = document.getElementById("progress-bar");

  if(!fileInput.files.length){ msg.innerText="Please select a PDF."; return; }
  if(!passwordInput.value){ msg.innerText="Please enter a password."; return; }

  const file = fileInput.files[0];
  const password = passwordInput.value;

  msg.innerText="Protecting PDF...";
  progressContainer.style.display='block';
  progressBar.style.width='0%';

  try{
    const bytes = await file.arrayBuffer();
    const pdfDoc = await PDFLib.PDFDocument.load(bytes);
    const newPdf = await PDFLib.PDFDocument.create();
    const pages = await newPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
    pages.forEach(p=>newPdf.addPage(p));

    // Encrypt PDF with password
    const protectedBytes = await newPdf.save({
      passwords: { user: password, owner: password },
      useObjectStreams: false
    });

    progressBar.style.width='80%';
    await new Promise(r=>setTimeout(r,200));

    const blob = new Blob([protectedBytes], {type:"application/pdf"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download="protected.pdf";
    a.click();

    progressBar.style.width='100%';
    msg.innerText="✅ PDF protected successfully!";
  }catch(e){
    console.error(e);
    msg.innerText="❌ Failed to protect PDF. Some PDF types may not support encryption in browser.";
  }
}
</script>

</body>
</html>
