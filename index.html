<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protect PDF – EasyUseHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: #f5f7fa;
}
header {
    background: #fff;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,.1);
}
header h1 {
    margin:0;
    font-size: 22px;
}
#ad-top, #ad-middle {
    margin: 20px auto;
    padding: 20px;
    background: #eee;
    width: 90%;
    border-radius: 8px;
    text-align: center;
}
.widget-container {
    width: 90%;
    max-width: 900px;
    margin: 0 auto 50px auto;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    background: #fff;
}
.upload-label {
    display: inline-block;
    margin: 20px 0;
    padding: 15px 30px;
    background: #2563eb;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}
</style>
</head>
<body>

<header>
<h1>Protect PDF – EasyUseHub</h1>
</header>

<div id="ad-top">Top Ad Placeholder</div>

<div class="widget-container">
    <p style="text-align:center; margin:20px 0;">Click the Upload button below to protect your PDF</p>
    
    <!-- Hidden file input to trigger widget -->
    <input type="file" id="file" style="display:none;" onchange="loadPDF24Widget()">
    <label class="upload-label" for="file">Upload File</label>
    
    <!-- PDF24 Widget container -->
    <div id="pdf24WidgetArea"></div>
</div>

<div id="ad-middle">Middle Ad Placeholder</div>

<!-- PDF24 Widget JS -->
<script src="https://tools.pdf24.org/static/js/widget.js"></script>
<script>
function loadPDF24Widget() {
    const fileInput = document.getElementById('file');
    if (!fileInput.files.length) return;

    // Load Protect PDF widget
    pdf24.loadWidget('lock-pdf', {
        containerId: 'pdf24WidgetArea',
        langCode: 'en',
        widgetConfig: {
            theme: 'lightTheme'
        },
        readyCallback: function() {
            console.log('PDF24 Protect PDF widget loaded');
        }
    });
}
</script>

</body>
</html>
