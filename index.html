<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protect PDF | EasyUseHub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --primary: #22c55e; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 90%; max-width: 400px; text-align: center; }
        .upload-zone { border: 2px dashed #cbd5e1; padding: 2rem; border-radius: 15px; cursor: pointer; margin-bottom: 1rem; background: #fff; }
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-green { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        #status { margin-top: 15px; font-size: 0.85rem; padding: 10px; border-radius: 5px; display: none; }
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .nav-link { text-decoration: none; color: white; background: #64748b; padding: 10px 15px; border-radius: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔐 Protect PDF</h1>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <span id="fileName">📁 Tap to select PDF</span>
    </div>
    <input type="file" id="fileInput" accept="application/pdf" style="display:none">
    <input type="password" id="passInput" placeholder="Password">
    <button class="btn-green" id="mainBtn" onclick="startProtection()">Protect & Download</button>
    <div id="status"></div>
    <div class="nav-btns">
        <a href="https://easyusehub.blogspot.com/?m=1" class="nav-link">🏠 Home</a>
        <a href="https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1" class="nav-link" style="background:#1e293b">📂 All Tools</a>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const mainBtn = document.getElementById('mainBtn');

    fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('fileName').innerText = "📄 " + fileInput.files[0].name; };

    async function startProtection() {
        const file = fileInput.files[0];
        const password = document.getElementById('passInput').value;

        if (!file || !password) return alert("Select file and password!");

        // Reset UI
        status.style.display = "block";
        status.style.background = "#e0f2fe";
        status.style.color = "#0369a1";
        status.innerText = "⏳ Initializing...";
        mainBtn.disabled = true;

        try {
            // Check if Library loaded
            if (typeof PDFLib === 'undefined') {
                throw new Error("Library failed to load. Check internet connection.");
            }

            const arrayBuffer = await file.arrayBuffer();
            
            // Try loading with ignore encryption
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { ignoreEncryption: true });

            status.innerText = "🔒 Applying Password...";

            await pdfDoc.encrypt({
                userPassword: password,
                ownerPassword: 'random_owner_pw_' + Math.random(),
                permissions: { printing: 'highResolution', modifying: false, copying: false }
            });

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "protected_" + file.name;
            link.click();

            status.innerText = "✅ Success! Download started.";
            status.style.background = "#dcfce7";
            status.style.color = "#15803d";
        } catch (err) {
            console.error(err);
            status.style.background = "#fee2e2";
            status.style.color = "#b91c1c";
            status.innerText = "❌ Error: " + err.message;
        } finally {
            mainBtn.disabled = false;
        }
    }
</script>
</body>
</html>
